<!DOCTYPE html>
<html lang="en">
<head>
    <!--The type of font we are using-->
    <meta charset="UTF-8">
    <!--Tells the -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ian Brownville">
    <meta name="description" content="Default HTML Page for SE 111">
    
    <link type="text/css" rel="stylesheet" href="style.css">

    <title>Week 5 | Tables and Forms</title>
</head>
<body>
    <form action="confirm.html" method="GET">
        <h1>Birthday Party Registration Form</h1>
        <table>
        <thead>
            <tr>
                <td><b>Labels</b></td>
                <td><b>Form Fields</b></td>
            </tr>
        </thead>
            <tbody>
                <tr>
                    <td><label for="gfirst">Parent/Guardian's Name</label></td>
                    <td><input type="text" required maxlength="20" name="gfirst" id="g-first" placeholder="Guardians Name "></td>
                </tr>
                <tr>
                    <td><label for="c-first">Child's First Name</label></td>
                    <td><input type="text" required maxlength="20" name="g-last" placeholder="Army Name"></td>
                </tr>
                <tr>
                    <td><label for="Age">Child's Age</label></td>
                    <td><input type="number" required name="age" id="age" value="3"></td>
                </tr>
                    <tr>
                        <td><h2>Date and Time</h2></td>
                    </tr>
                <tr>
                    <td><label for="date">Date</label></td>
                    <td><input type="date" required name="date" id="date"></td>
                </tr>
                <tr>
                    <td><label for="time">Start Time</label></td>
                    <td><input type="time" required name="time" id="s-time"></td>
                </tr>
                <tr>
                    <td><label for="Guests">Number of Guests</label></td>
                    <td><input type="numer" name="guests" value="5"></td>
                </tr>
                <tr>
                    <td><h2>Loadout</h2></td>
                </tr>
                <tr>
                    <td><label for="Size">Size</label></td>  
                    <td><input type="radio" name="size"><sm id="sm">sm</sm>
                        <input type="radio" name="size"><md id="md">med</md>
                        <input type="radio" name="size"><lg id="lg">lg</lg></td>
                </tr>
                <tr>
                    <td><label for="drinks">Drinks</label></td>
                    <td><input type="checkbox" name="drink1" id="drink1" checked value="coke"><label for="drink1">Coke</label><br>
                        <input type="checkbox" name="drink2" id="drink2" value="Sprite"><label for="drink2">Sprite</label><br>
                        <input type="checkbox" name="drink3" id="drink3" value="Fruit Punch"><label for="drink3">Fruit Punch</label><br>
                        <input type="checkbox" name="drink4" id="drink4" value="Lemonade"><label for="drink4">Lemonade</label><br>
                        <input type="checkbox" name="drink5" id="drink5" value="Iced Tea"><label for="drink5">Iced Tea</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="cake">Cake</label></td>
                    <td><select name="cake" id="cake"><option selected>Choclate</option><option>Vanilla</option><option>I'll bring my own</option></select></td>
                <tr>
                    <td><h2>Decorations</h2></td>
                </tr>
                <tr>
                    <td><label for="colors">Color Scheme</label></td>
                    <td><input type="color" name="colors" id="colors"></td>
                </tr>
                <tr>
                    <td><label for="comments">Additional Comments</label></td>
                    <td><textarea placeholder="Please add any additional commenst here" name="comments" id="commenst"></textarea></td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="submit" value="Submit"></td>
                </tr>    
            </tbody>
        </table>    
    </form>
    
</body>
</html>
